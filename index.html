<!DOCTYPE html>

<html lang="en">
  <head>
    <title>Soft UI Pro</title>
    <meta property="og:title" content="Soft UI Pro" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />
    <meta property="twitter:card" content="summary_large_image" />
    <style>
      html {  line-height: 1.15;}body {  margin: 0;}* {  box-sizing: border-box;  border-width: 0;  border-style: solid;}p,li,ul,pre,div,h1,h2,h3,h4,h5,h6 {  margin: 0;  padding: 0;}button,input,optgroup,select,textarea {  font-family: inherit;  font-size: 100%;  line-height: 1.15;  margin: 0;}button,select {  text-transform: none;}button,[type="button"],[type="reset"],[type="submit"] {  -webkit-appearance: button;}button::-moz-focus-inner,[type="button"]::-moz-focus-inner,[type="reset"]::-moz-focus-inner,[type="submit"]::-moz-focus-inner {  border-style: none;  padding: 0;}button:-moz-focus,[type="button"]:-moz-focus,[type="reset"]:-moz-focus,[type="submit"]:-moz-focus {  outline: 1px dotted ButtonText;}a {  color: inherit;  text-decoration: inherit;}input {  padding: 2px 4px;}img {  display: block;}
    </style>
    <style>
      html {
        font-family: Open Sans;
        font-size: 1rem;
      }

      body {
        font-weight: 400;
        font-style:normal;
        text-decoration: none;
        text-transform: none;
        letter-spacing: normal;
        line-height: 1.625;
        color: var(--dl-color-secondary-400);
        background-color: var(--dl-color-gray-white);

      }
    </style>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300;1,400;1,600;1,700;1,800&display=swap"
    />
    <style>
      html * {
          -webkit-font-smoothing: antialiased;
      }
      input::placeholder, textarea::placeholder {
         color: #d2d6da;
      }
    </style>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div>
      <link href="./index.css" rel="stylesheet" />

      <div class="index-container">
        <div data-role="Header" class="index-header">
          <nav class="index-nav">
            <div class="index-container01">
              <a href="/" class="index-navlink large">Soft UI Design System</a>
              <div class="index-menu">
                <a href="/" class="index-navlink1 large">Home</a>
              </div>
              <div class="index-container02">
                <div class="index-container03">
                  <div class="index-container04">
                    <button class="index-button button buttonSmall">
                      useless button
                    </button>
                  </div>
                </div>
                <div data-type="BurgerMenu" class="index-burger-menu">
                  <svg viewBox="0 0 1024 1024" class="index-icon">
                    <path
                      d="M128 256h768v86h-768v-86zM128 554v-84h768v84h-768zM128 768v-86h768v86h-768z"
                    ></path>
                  </svg>
                </div>
              </div>
            </div>
          </nav>
          <div data-type="MobileMenu" class="index-mobile-menu">
            <div class="index-top">
              <a href="/" class="index-navlink2 large">Soft UI Design System</a>
              <div data-type="CloseMobileMenu" class="index-close-menu">
                <svg viewBox="0 0 1024 1024" class="index-icon2">
                  <path
                    d="M810 274l-238 238 238 238-60 60-238-238-238 238-60-60 238-238-238-238 60-60 238 238 238-238z"
                  ></path>
                </svg>
              </div>
            </div>
            <div class="index-mid">
              <div class="index-menu1">
                <a href="/" class="index-navlink3 large">Home</a>
                <span class="index-text large">Profile</span>
                <span class="index-text1 large">Coming Soon</span>
              </div>
            </div>
            <div class="index-bot">
              <div class="primary-pink-button-container">
                <button class="primary-pink-button-button button buttonSmall">
                  <span>buy now</span>
                </button>
              </div>
            </div>
          </div>
        </div>
        <div class="index-hero">
          <div class="index-container05">
            <div class="index-card">
              <h1 class="index-text2 headingOne">Wygenerowana strona</h1>
              <h1 class="index-text3 headingOne">TeleportHQ</h1>
              <span class="index-text4 lead">
                Programowanie interfejsów webowych
              </span>
              <div class="index-container06">
                <div class="index-container07">
                  <div class="index-container08">
                    <a
                      href="https://github.com/matCh00"
                      target="_blank"
                      rel="noreferrer noopener"
                      class="index-link button buttonSmall"
                    >
                      Github
                    </a>
                  </div>
                </div>
                <div class="index-container09">
                  <a
                    href="https://github.com/matCh00/PIW_L"
                    target="_blank"
                    rel="noreferrer noopener"
                    class="index-link1 button buttonSmall"
                  >
                    PROJEKT
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
        <img
          alt="image"
          src="https://images.unsplash.com/photo-1646298116694-e7562195e8e5?ixid=Mnw5MTMyMXwwfDF8YWxsfDI0OXx8fHx8fDJ8fDE2NDY0Mzk3MTI&amp;ixlib=rb-1.2.1&amp;h=900"
          class="index-image"
        />
        <footer class="footer-footer">
          <div class="footer-container">
            <div class="footer-container1">
              <span class="footer-text">SOFT</span>
              <span>Copyright © 2021 Soft by Creative Tim.</span>
            </div>
            <div class="footer-container2">
              <span class="footer-text2 large">Social</span>
              <a
                href="https://github.com/matCh00"
                target="_blank"
                rel="noreferrer noopener"
              >
                <span>Github</span>
              </a>
            </div>
            <div class="footer-container3"></div>
          </div>
          <img
            alt="image"
            src="../public/playground_assets/waves-white.svg"
            class="footer-image"
          />
        </footer>
      </div>
    </div>
    <script src="https://unpkg.com/@teleporthq/teleport-custom-scripts"></script>
  </body>
</html>
